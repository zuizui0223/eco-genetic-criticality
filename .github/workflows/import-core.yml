name: Import eco-genetic core

on:
  push:
    branches: [import-core]

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: import-core
          fetch-depth: 0
      - name: Copy fixed source snapshot
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/zuizui0223/microdonta.git source
          cd source
          git fetch --depth 1 origin 7dfec05444b92e99a914cb30ee1177523fd98b2d
          git checkout --detach 7dfec05444b92e99a914cb30ee1177523fd98b2d
          cd ..

          files=(
            causal_model/__init__.py
            causal_model/eco_genetic_principles.py
            causal_model/eco_genetic_lag_theory.py
            causal_model/eco_genetic_constitutive_theory.py
            causal_model/multipatch_criticality_dynamics.py
            causal_model/multipatch_criticality_ensemble.py
            causal_model/patch_genetic_drift_theory.py
            causal_model/finite_bin_closure_bounds.py
            causal_model/stochastic_refuge_invariance.py
            causal_model/migration_safe_refuge.py
            causal_model/network_allele_floor_theory.py
            causal_model/network_high_trait_floor_theory.py
            causal_model/probabilistic_h_alpha_lead_theory.py
            causal_model/theorem_projection_ledger.py
            causal_model/colonization_recruitment_factorization.py
            tests/test_eco_genetic_principles.py
            tests/test_eco_genetic_lag_theory.py
            tests/test_eco_genetic_constitutive_theory.py
            tests/test_multipatch_criticality_dynamics.py
            tests/test_multipatch_criticality_ensemble.py
            tests/test_patch_genetic_drift_theory.py
            tests/test_finite_bin_closure_bounds.py
            tests/test_stochastic_refuge_invariance.py
            tests/test_migration_safe_refuge.py
            tests/test_network_allele_floor_theory.py
            tests/test_network_high_trait_floor_theory.py
            tests/test_probabilistic_h_alpha_lead_theory.py
            tests/test_theorem_projection_ledger.py
            tests/test_colonization_recruitment_factorization.py
            docs/eco_genetic_hypothesis_program.md
            docs/general_eco_genetic_principles.md
            docs/eco_genetic_constitutive_theory.md
            docs/three_hypotheses_status.md
            docs/multipatch_criticality_dynamics_contract.md
            docs/multipatch_phase_diagram_pilot.md
            docs/patch_genetic_drift_theory.md
            docs/finite_bin_closure_bounds.md
            docs/stochastic_refuge_invariance_theorem.md
            docs/migration_safe_refuge_bound.md
            docs/network_allele_floor_theorem.md
            docs/network_high_trait_floor_theorem.md
            docs/probabilistic_h_alpha_lead_theorem.md
            docs/theorem_projection_ledger.md
            docs/colonization_recruitment_factorization.md
          )
          for f in "${files[@]}"; do
            test -f "source/$f"
            mkdir -p "$(dirname "$f")"
            cp "source/$f" "$f"
          done
          cat > README.md <<'EOF'
          # Eco-genetic criticality

          A theorem-first research repository for eco-genetic criticality under finite populations.

          ## Core hypotheses
          - **H1:** interaction criticality can alter potential high-trait viability.
          - **H2:** under declared bounds, genetic warning can precede realised high-trait loss.
          - **H3:** at fixed total area, isolation, migration rescue, and migration erosion can yield different trait and genetic outcomes.

          ## Architecture
          ```text
          mathematical theorem -> declared model projection -> finite-population closure -> simulation robustness -> empirical measurement design
          ```

          Potential viability, realised trait occupancy, allele persistence, and genetic diversity are separate states.

          ## Provenance
          Imported from `zuizui0223/microdonta` at commit `7dfec05444b92e99a914cb30ee1177523fd98b2d`. The source repository remains a legacy archive during the split.
          EOF
          cat > requirements-dev.txt <<'EOF'
          pytest>=8.0
          EOF
          cat > .github/workflows/ci.yml <<'EOF'
          name: CI
          on:
            pull_request:
            push:
              branches: [main]
          jobs:
            tests:
              runs-on: ubuntu-latest
              strategy:
                fail-fast: false
                matrix:
                  python-version: ['3.10', '3.11', '3.12']
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: ${{ matrix.python-version }}
                - run: python -m pip install --upgrade pip pytest
                - run: pytest -q
          EOF
          cat > MIGRATION_MANIFEST.md <<'EOF'
          # Migration manifest

          Source: `zuizui0223/microdonta@7dfec05444b92e99a914cb30ee1177523fd98b2d`.

          Included: the H1--H3 theorem-first eco-genetic core, finite-bin closure, tests, and supporting documentation. Excluded: generic RACH/rule-transition methods, Campanula-Izu case study, Streamlit app, and unrelated ABM families.
          EOF
          rm -rf source
          rm .github/workflows/import-core.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md MIGRATION_MANIFEST.md requirements-dev.txt causal_model tests docs .github/workflows/ci.yml
          git commit -m 'Import theorem-first eco-genetic core' || exit 0
          git push origin HEAD:import-core