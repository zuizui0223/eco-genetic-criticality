name: Diagnose final migration
on:
  pull_request:
    branches: [main]
jobs:
  debug:
    if: github.event.pull_request.head.ref == 'migration-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: migration-final
          fetch-depth: 0
      - name: Trace import stages
        shell: bash
        run: |
          set +e
          exec > final-debug.txt 2>&1
          set -x
          git clone --depth 1 https://github.com/zuizui0223/microdonta.git source; echo clone=$?
          cd source; git fetch --depth 1 origin 7dfec05444b92e99a914cb30ee1177523fd98b2d; echo fetch=$?; git checkout --detach 7dfec05444b92e99a914cb30ee1177523fd98b2d; echo checkout=$?; cd ..
          mkdir -p causal_model tests docs examples .github/workflows
          find source/causal_model -maxdepth 1 -type f \( -name 'eco_genetic*.py' -o -name 'multipatch_criticality*.py' -o -name 'patch_genetic*.py' -o -name 'finite_bin*.py' -o -name 'stochastic_refuge*.py' -o -name 'migration_safe*.py' -o -name 'network_*.py' -o -name 'probabilistic_h_alpha*.py' -o -name 'colonization_recruitment_factorization.py' -o -name 'theorem_projection_ledger.py' \) -exec cp {} causal_model/ \;; echo causal=$?
          find source/tests -maxdepth 1 -type f \( -name 'test_eco_genetic*.py' -o -name 'test_multipatch_criticality*.py' -o -name 'test_patch_genetic*.py' -o -name 'test_finite_bin*.py' -o -name 'test_stochastic_refuge*.py' -o -name 'test_migration_safe*.py' -o -name 'test_network_*.py' -o -name 'test_probabilistic_h_alpha*.py' -o -name 'test_colonization_recruitment_factorization.py' -o -name 'test_theorem_projection_ledger.py' \) -exec cp {} tests/ \;; echo tests=$?
          find source/docs -maxdepth 1 -type f \( -name 'eco_genetic*.md' -o -name 'general_eco_genetic*.md' -o -name 'three_hypotheses_status.md' -o -name 'multipatch_criticality*.md' -o -name 'multipatch_phase_diagram*.md' -o -name 'patch_genetic*.md' -o -name 'finite_bin*.md' -o -name 'stochastic_refuge*.md' -o -name 'migration_safe*.md' -o -name 'network_*.md' -o -name 'probabilistic_h_alpha*.md' -o -name 'colonization_recruitment_factorization.md' -o -name 'theorem_projection_ledger.md' \) -exec cp {} docs/ \;; echo docs=$?
          find source/examples -maxdepth 1 -type f \( -name 'eco_genetic*.py' -o -name 'multipatch_phase_diagram*.py' -o -name 'finite_bin*.py' -o -name 'probabilistic_h_alpha*.py' \) -exec cp {} examples/ \;; echo examples=$?
          : > causal_model/__init__.py
          printf '[build-system]\nrequires=["setuptools>=64","wheel"]\nbuild-backend="setuptools.build_meta"\n[project]\nname="eco-genetic-criticality"\nversion="0.1.0"\nrequires-python=">=3.10"\n[tool.setuptools]\npackages=["causal_model"]\n' > pyproject.toml
          printf '# Eco-genetic criticality\n' > README.md
          rm -rf source
          rm -f .github/workflows/import-final.yml .github/workflows/final-debug.yml
          git config user.name 'github-actions[bot]'; git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A; echo add=$?
          git status --short
          git commit -m 'debug import commit'; echo commit=$?
          git push --dry-run origin HEAD:migration-final; echo dry_push=$?
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-migration-debug
          path: final-debug.txt