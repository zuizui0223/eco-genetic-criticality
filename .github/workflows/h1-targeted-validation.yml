name: H1-Targeted Finite Validation

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Experiment profile"
        type: choice
        required: true
        default: standard
        options:
          - quick
          - standard
          - full
      inside_positions:
        description: "Comma-separated one-large bistable-interval positions, each strictly between 0 and 1"
        type: string
        required: true
        default: "0.25,0.5,0.75"
      master_seed:
        description: "Base master random seed"
        type: string
        required: true
        default: "20260629"
      replicates:
        description: "Optional override for replicates per design cell; leave blank to use profile default"
        type: string
        required: false
        default: ""
      generations:
        description: "Optional override for generations per finite run; leave blank to use profile default"
        type: string
        required: false
        default: ""
      allow_full_profile:
        description: "I explicitly approve the expensive full profile"
        type: boolean
        required: true
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Guard full profile
        if: ${{ inputs.profile == 'full' && !inputs.allow_full_profile }}
        run: |
          echo "The full profile requires allow_full_profile=true." >&2
          exit 2
      - name: Run one-large H1-targeted finite validation
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          INSIDE_POSITIONS: ${{ inputs.inside_positions }}
          MASTER_SEED: ${{ inputs.master_seed }}
          REPLICATES: ${{ inputs.replicates }}
          GENERATIONS: ${{ inputs.generations }}
        run: |
          set -euo pipefail
          POSITION_TAG="$(printf '%s' "$INSIDE_POSITIONS" | tr ',' '_' | tr -cd '[:alnum:]_.-')"
          if [[ -z "$POSITION_TAG" ]]; then
            echo "inside_positions cannot be empty." >&2
            exit 2
          fi
          OUTDIR="artifacts/h1_targeted_validation/${PROFILE}-positions-${POSITION_TAG}-seed-${MASTER_SEED}"
          ARGS=(--profile "$PROFILE" --master-seed "$MASTER_SEED" --output-dir "$OUTDIR" --prefix run)
          IFS=',' read -r -a POSITIONS <<< "$INSIDE_POSITIONS"
          for RAW_POSITION in "${POSITIONS[@]}"; do
            POSITION="$(printf '%s' "$RAW_POSITION" | xargs)"
            if [[ -z "$POSITION" ]]; then
              echo "inside_positions contains an empty value." >&2
              exit 2
            fi
            ARGS+=(--inside-position "$POSITION")
          done
          if [[ -n "$REPLICATES" ]]; then
            ARGS+=(--replicates "$REPLICATES")
          fi
          if [[ -n "$GENERATIONS" ]]; then
            ARGS+=(--generations "$GENERATIONS")
          fi
          python scripts/run_h1_targeted_validation_campaign.py "${ARGS[@]}"
      - name: Upload H1-targeted validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: h1-targeted-${{ inputs.profile }}-positions-${{ inputs.inside_positions }}-seed-${{ inputs.master_seed }}
          path: artifacts/h1_targeted_validation/
          if-no-files-found: warn
          retention-days: 90
