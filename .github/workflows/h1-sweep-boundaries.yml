name: H1 Finite Sweep Boundaries

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Experiment profile"
        type: choice
        required: true
        default: standard
        options:
          - quick
          - standard
          - full
      endpoint_padding_fractions:
        description: "Comma-separated, strictly increasing padding fractions of the canonical interval width"
        type: string
        required: true
        default: "0.1,0.5,1.0,2.0"
      stage_generations:
        description: "Generations per continuation barrier stage"
        type: string
        required: true
        default: "30"
      barrier_points:
        description: "Barrier-grid points per endpoint sweep (at least 3)"
        type: string
        required: true
        default: "25"
      master_seed:
        description: "Base master random seed"
        type: string
        required: true
        default: "20260629"
      replicates:
        description: "Optional override for replicates per H1 pair; leave blank to use profile default"
        type: string
        required: false
        default: ""
      allow_full_profile:
        description: "I explicitly approve the expensive full profile"
        type: boolean
        required: true
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Guard full profile
        if: ${{ inputs.profile == 'full' && !inputs.allow_full_profile }}
        run: |
          echo "The full profile requires allow_full_profile=true." >&2
          exit 2
      - name: Run finite H1 endpoint-expanded sweep boundaries
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          PADDING_FRACTIONS: ${{ inputs.endpoint_padding_fractions }}
          STAGE_GENERATIONS: ${{ inputs.stage_generations }}
          BARRIER_POINTS: ${{ inputs.barrier_points }}
          MASTER_SEED: ${{ inputs.master_seed }}
          REPLICATES: ${{ inputs.replicates }}
        run: |
          set -euo pipefail
          PADDING_TAG="$(printf '%s' "$PADDING_FRACTIONS" | tr ',' '_' | tr -cd '[:alnum:]_.-')"
          if [[ -z "$PADDING_TAG" ]]; then
            echo "endpoint_padding_fractions cannot be empty." >&2
            exit 2
          fi
          OUTDIR="artifacts/h1_sweep_boundaries/${PROFILE}-padding-${PADDING_TAG}-stage-${STAGE_GENERATIONS}-seed-${MASTER_SEED}"
          ARGS=(
            --profile "$PROFILE"
            --master-seed "$MASTER_SEED"
            --output-dir "$OUTDIR"
            --prefix run
            --stage-generations "$STAGE_GENERATIONS"
            --barrier-points "$BARRIER_POINTS"
          )
          IFS=',' read -r -a FRACTIONS <<< "$PADDING_FRACTIONS"
          for RAW_FRACTION in "${FRACTIONS[@]}"; do
            FRACTION="$(printf '%s' "$RAW_FRACTION" | xargs)"
            if [[ -z "$FRACTION" ]]; then
              echo "endpoint_padding_fractions contains an empty value." >&2
              exit 2
            fi
            ARGS+=(--endpoint-padding-fraction "$FRACTION")
          done
          if [[ -n "$REPLICATES" ]]; then
            ARGS+=(--replicates "$REPLICATES")
          fi
          python scripts/run_finite_h1_sweep_boundary_audit.py "${ARGS[@]}"
      - name: Upload H1 sweep-boundary artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: h1-sweep-${{ inputs.profile }}-padding-${{ inputs.endpoint_padding_fractions }}-stage-${{ inputs.stage_generations }}-seed-${{ inputs.master_seed }}
          path: artifacts/h1_sweep_boundaries/
          if-no-files-found: warn
          retention-days: 90
