name: H1 Hysteresis Duration Robustness

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Experiment profile"
        type: choice
        required: true
        default: standard
        options:
          - quick
          - standard
          - full
      stage_generations:
        description: "Comma-separated, strictly increasing generations per continuation stage"
        type: string
        required: true
        default: "5,10,30,80"
      master_seed:
        description: "Base master random seed"
        type: string
        required: true
        default: "20260629"
      replicates:
        description: "Optional override for replicates per H1 pair; leave blank to use profile default"
        type: string
        required: false
        default: ""
      barrier_points:
        description: "Continuation barrier-grid points (at least 3)"
        type: string
        required: true
        default: "7"
      gap_stability_tolerance:
        description: "Largest-two-duration maximum-gap tolerance"
        type: string
        required: true
        default: "0.05"
      allow_full_profile:
        description: "I explicitly approve the expensive full profile"
        type: boolean
        required: true
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Guard full profile
        if: ${{ inputs.profile == 'full' && !inputs.allow_full_profile }}
        run: |
          echo "The full profile requires allow_full_profile=true." >&2
          exit 2
      - name: Run finite H1 stage-duration robustness audit
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          STAGE_GENERATIONS: ${{ inputs.stage_generations }}
          MASTER_SEED: ${{ inputs.master_seed }}
          REPLICATES: ${{ inputs.replicates }}
          BARRIER_POINTS: ${{ inputs.barrier_points }}
          GAP_STABILITY_TOLERANCE: ${{ inputs.gap_stability_tolerance }}
        run: |
          set -euo pipefail
          DURATION_TAG="$(printf '%s' "$STAGE_GENERATIONS" | tr ',' '_' | tr -cd '[:alnum:]_.-')"
          if [[ -z "$DURATION_TAG" ]]; then
            echo "stage_generations cannot be empty." >&2
            exit 2
          fi
          OUTDIR="artifacts/h1_hysteresis_duration/${PROFILE}-stages-${DURATION_TAG}-seed-${MASTER_SEED}"
          ARGS=(
            --profile "$PROFILE"
            --master-seed "$MASTER_SEED"
            --output-dir "$OUTDIR"
            --prefix run
            --barrier-points "$BARRIER_POINTS"
            --gap-stability-tolerance "$GAP_STABILITY_TOLERANCE"
          )
          IFS=',' read -r -a DURATIONS <<< "$STAGE_GENERATIONS"
          for RAW_DURATION in "${DURATIONS[@]}"; do
            DURATION="$(printf '%s' "$RAW_DURATION" | xargs)"
            if [[ -z "$DURATION" ]]; then
              echo "stage_generations contains an empty value." >&2
              exit 2
            fi
            ARGS+=(--stage-generations "$DURATION")
          done
          if [[ -n "$REPLICATES" ]]; then
            ARGS+=(--replicates "$REPLICATES")
          fi
          python scripts/run_finite_h1_hysteresis_duration_audit.py "${ARGS[@]}"
      - name: Upload H1 duration-robustness artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: h1-duration-${{ inputs.profile }}-stages-${{ inputs.stage_generations }}-seed-${{ inputs.master_seed }}
          path: artifacts/h1_hysteresis_duration/
          if-no-files-found: warn
          retention-days: 90
