name: Diagnose PR 6
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    if: github.event.pull_request.number == 6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - run: pytest -q --tb=short --maxfail=30 > pytest-report.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr6-pytest-report
          path: pytest-report.txt
