name: Import push probe
on:
  push:
    branches: [probe]
permissions:
  contents: write
jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: probe
          fetch-depth: 0
      - name: Copy one source file and push
        run: |
          git clone --depth 1 https://github.com/zuizui0223/microdonta.git source
          cd source
          git fetch --depth 1 origin 7dfec05444b92e99a914cb30ee1177523fd98b2d
          git checkout --detach 7dfec05444b92e99a914cb30ee1177523fd98b2d
          cd ..
          mkdir -p causal_model
          cp source/causal_model/multipatch_criticality_dynamics.py causal_model/
          rm -rf source
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add causal_model/multipatch_criticality_dynamics.py
          git commit -m 'Probe source-to-destination import'
          git push origin HEAD:probe