name: Privileged branch-write probe
on:
  pull_request_target:
    types: [synchronize, reopened]
permissions:
  contents: write
jobs:
  probe:
    if: github.event.pull_request.head.ref == 'migration-final' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: migration-final
          fetch-depth: 0
      - shell: bash
        run: |
          set -euo pipefail
          printf 'privileged write verified\n' > .privileged-probe
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .privileged-probe
          git commit -m 'Verify privileged migration write token'
          git push origin HEAD:migration-final